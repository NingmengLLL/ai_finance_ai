# ── 金融指标知识（原散落于 entity_extractor + context_compressor + query_transform + calculator）──
metrics:
  营收:
    synonyms: [收入, 营业收入, 总收入, revenue]
    related: [毛利率, 净利润]
    unit: 亿元
    search_terms: [收入, 总收入, 营业收入]
    regex_patterns:
      - "20(2[2-5])年[^。\\n]*?营业收入(?:为)?([0-9.]+)亿元"

  净利润:
    synonyms: [利润, 盈利, 溢利, 归母净利润, net profit]
    related: [营收, 毛利率, 费用率]
    unit: 亿元
    search_terms: [经营盈利, 年度盈利, 净利润, 溢利]

  毛利率:
    synonyms: [毛利, 毛利率, gross margin]
    related: [营收, 净利润]
    unit: "%"
    search_terms: [毛利率, 毛利及毛利率]

  现金流:
    synonyms: [现金流量, 经营现金流, 自由现金流, cash flow]
    related: [净现比, 应收账款周转]
    unit: 亿元
    search_terms: [现金流量, 经营活动所得现金, 经营现金流]
    expansion_terms: [经营活动现金流量净额, 自由现金流, 净现比, 应收账款周转]

  估值:
    synonyms: [市盈率, PE, 估值, valuation]
    related: [盈利预测, 市值]
    unit: x
    search_terms: [市盈率, PE, 估值]
    expansion_terms: [市盈率, 盈利预测, 市值, 估值假设]

  风险:
    synonyms: [风险提示, 风险因素]
    related: [预算波动, 成本变化, 竞争加剧]
    expansion_terms: [风险提示, 预算波动, 成本变化, 竞争加剧]

  市盈率:
    synonyms: [PE, 估值, 多少倍]
    unit: x
    regex_patterns:
      - "市值(?:为)?([0-9.]+)亿元"
      - "净利润(?:为)?([0-9.]+)亿元"

  营业收入:
    synonyms: [营收, 收入, 总收入]
    search_terms: [收入, 总收入, 营业收入]

  ROE:
    synonyms: [净资产收益率, Return on Equity]

  资产负债率:
    synonyms: [负债率, leverage ratio]

  自由现金流:
    synonyms: [FCF, free cash flow]
    search_terms: [现金流量, 经营活动所得现金, 经营现金流]


# ── 计算模板（原散落于 calculator_node.py）──
calc_templates:
  revenue_yoy:
    trigger_keywords: [同比, 增长率, CAGR, 增速]
    description: 营业收入同比增长率
    formula_template: "(new - old) / old * 100"
    metric_label: 营业收入同比
    unit: "%"

  pe_ratio:
    trigger_keywords: [市盈率, PE, 估值, 多少倍]
    description: 市盈率 = 市值 / 净利润
    formula_template: "market_cap / net_profit"
    metric_label: 市盈率
    unit: x


# ── 关系模板（原散落于 relation_extractor.py）──
relation_templates:
  - head: 云资源成本
    relation: 影响
    tail: 毛利率
  - head_pattern: "公司"
    relation: 披露指标
    tail_pattern: "指标"


# ── 压缩器噪声模式（原散落于 context_compressor.py）──
noise_patterns:
  - 免责声明
  - 重要声明
  - 目录
  - 本报告仅供


# ── 中文数字映射（原散落于 context_compressor.py）──
chinese_digit_map:
  零: "0"
  〇: "0"
  一: "1"
  二: "2"
  三: "3"
  四: "4"
  五: "5"
  六: "6"
  七: "7"
  八: "8"
  九: "9"